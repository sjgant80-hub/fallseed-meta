<style>
:root{--void:#0b0a0f;--void-2:#13121a;--ink:#1a1922;--line:#2a2934;--line-soft:#1f1e28;--cream:#e6e1d6;--cream-dim:#a8a395;--cream-muted:#6e6a5e;--brass:#b8974a;--amber:#ff8c00;--ox:#8b1a1a;--green:#4ade80;--red:#ef4444;--blue:#60a5fa;--yellow:#fbbf24;--violet:#a855f7;--serif:Georgia,'Libre Baskerville',ui-serif,serif;--sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace}
*{margin:0;padding:0;box-sizing:border-box}html,body{background:var(--void);color:var(--cream);font:14px/1.55 var(--sans);min-height:100dvh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;background:transparent;border:none;color:inherit}
input,textarea,select{font-family:inherit;background:var(--ink);border:1px solid var(--line);color:var(--cream);border-radius:3px;padding:8px 11px;outline:none;font-size:13px;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--brass)}
.app{min-height:100dvh;display:grid;grid-template-rows:64px 1fr}
header{display:flex;align-items:center;border-bottom:1px solid var(--line);background:var(--void-2);user-select:none;padding:0 22px;gap:14px;position:sticky;top:0;z-index:50}
.brand .mark{width:38px;height:38px;background:linear-gradient(135deg,var(--brass),var(--amber));border-radius:6px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:22px;color:var(--void)}
.brand{display:flex;align-items:center;gap:12px}
.brand .name{font-family:var(--serif);font-weight:700;font-size:18px}
.brand .seal{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.16em;text-transform:uppercase}
nav.tabs{display:flex;flex:1;justify-content:center;gap:4px;flex-wrap:wrap;overflow-x:auto}
nav.tabs button{padding:8px 14px;font-size:13px;color:var(--cream-dim);letter-spacing:.04em;border-radius:4px;white-space:nowrap}
nav.tabs button:hover{color:var(--cream);background:var(--ink)}
nav.tabs button.active{color:var(--brass);background:var(--ink);border-bottom:2px solid var(--brass)}
.tier{padding:6px 12px;border-radius:3px;font-size:11px;color:var(--cream-dim);font-family:var(--mono);border:1px solid var(--line);letter-spacing:.06em;text-transform:uppercase}
main{padding:24px 32px 80px;overflow-y:auto;max-width:1400px;margin:0 auto;width:100%}
.hero{background:linear-gradient(135deg,rgba(184,151,74,.08),rgba(255,140,0,.04));border:1px solid var(--brass);border-radius:6px;padding:26px 28px;margin-bottom:20px}
.hero h1{font-family:var(--serif);font-size:24px;font-weight:700;margin-bottom:8px;color:var(--brass)}
.hero .lede{font-size:13px;color:var(--cream-dim);line-height:1.65;max-width:900px}
.hero .v-badge{display:inline-block;background:var(--brass);color:var(--void);font-family:var(--mono);font-size:10px;letter-spacing:.12em;padding:3px 8px;border-radius:3px;margin-left:10px;vertical-align:middle}
.section-h{display:flex;justify-content:space-between;align-items:baseline;margin:20px 0 12px;gap:14px;flex-wrap:wrap}
.section-h h2{font-family:var(--serif);font-size:18px;font-weight:600}
.section-h .sub{font-family:var(--mono);font-size:11px;color:var(--cream-muted);letter-spacing:.08em;text-transform:uppercase}
.card{background:var(--void-2);border:1px solid var(--line);border-radius:5px;padding:16px 18px;margin-bottom:12px}
.card h3{font-family:var(--serif);font-size:15px;font-weight:600;margin-bottom:8px}
.btn{padding:7px 14px;border:1px solid var(--brass);border-radius:3px;font-size:12px;color:var(--cream);background:transparent}
.btn:hover{border-color:var(--amber);color:var(--amber)}
.btn.brass{background:var(--brass);color:var(--void);border-color:var(--brass);font-weight:600}
.btn.brass:hover{background:var(--amber)}
.btn.sm{padding:4px 10px;font-size:11px}
.btn.ghost{border-color:var(--line);color:var(--cream-dim)}
.btn.danger{border-color:var(--red);color:var(--red)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brass);color:var(--void);padding:10px 20px;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;opacity:0;transition:all .22s;z-index:1100;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red);color:#fff}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.66);display:none;align-items:flex-start;justify-content:center;z-index:1000;padding:60px 22px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--void-2);border:1px solid var(--brass);border-radius:6px;padding:24px 26px;max-width:780px;width:100%;max-height:82vh;overflow-y:auto;position:relative}
.modal h3{font-family:var(--serif);font-size:18px;margin-bottom:16px;color:var(--brass)}
.modal .close{position:absolute;top:12px;right:14px;color:var(--cream-muted);font-size:22px;line-height:1}
.modal .close:hover{color:var(--cream)}
.inspect-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.inspect-card{background:var(--ink);border:1px solid var(--line);border-radius:4px;padding:14px;text-align:center}
.inspect-card .num{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--brass)}
.inspect-card .lbl{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}

/* Population view */
.level-group{margin-bottom:18px}
.level-head{font-family:var(--mono);font-size:11px;color:var(--brass);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.seed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.seed-card{background:var(--ink);border:1px solid var(--line);border-radius:4px;padding:14px 16px;cursor:pointer;transition:border-color .15s;position:relative}
.seed-card:hover{border-color:var(--brass)}
.seed-card .nm{font-family:var(--mono);color:var(--brass);font-size:12px;font-weight:600;margin-bottom:4px}
.seed-card .desc{font-size:11px;color:var(--cream-dim);line-height:1.5;margin-bottom:8px;min-height:32px}
.seed-card .meta{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:.04em}

.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--cream-muted);margin-right:6px;vertical-align:1px}
.status-dot.up{background:var(--green)}
.status-dot.down{background:var(--red)}
.status-dot.checking{background:var(--yellow);animation:pulse 1s infinite}
.status-dot.unknown{background:var(--cream-muted)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.online-flag{position:absolute;top:8px;right:10px;background:rgba(74,222,128,.18);color:var(--green);font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:9px;letter-spacing:.06em;font-weight:700}

/* Lineage tree */
.tree-root{padding:8px 0}
.tree-node{padding:10px 14px;border:1px solid var(--line);border-radius:3px;background:var(--ink);margin-bottom:6px;cursor:pointer;transition:border-color .15s;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center}
.tree-node:hover{border-color:var(--brass)}
.tree-node .lvl-badge{background:var(--brass);color:var(--void);font-family:var(--mono);font-size:9px;letter-spacing:.1em;padding:2px 7px;border-radius:9px;font-weight:700}
.tree-node .lvl-badge.tool{background:rgba(168,85,247,.15);color:var(--violet);border:1px solid var(--violet)}
.tree-node .nm{font-family:var(--mono);color:var(--brass);font-weight:600;font-size:13px}
.tree-node .meta{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.04em;margin-top:3px}
.tree-children{padding-left:24px;border-left:1px dashed var(--line);margin-left:20px;margin-top:4px;margin-bottom:8px}

/* Mesh view */
.peer-row{padding:10px 14px;border:1px solid var(--line);border-radius:3px;margin-bottom:6px;background:var(--ink);display:grid;grid-template-columns:auto 1fr auto auto;gap:14px;align-items:center}
.peer-row .src{font-family:var(--mono);color:var(--brass);font-size:12px;font-weight:600}
.peer-row .meta{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.04em;margin-top:3px}
.peer-row .seen{font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:.04em}

/* Smoke test */
.smoke-row{padding:10px 14px;border:1px solid var(--line);border-radius:3px;margin-bottom:5px;background:var(--ink);display:grid;grid-template-columns:24px 1fr auto auto;gap:14px;align-items:center;font-family:var(--mono);font-size:11px}
.smoke-row .icon{font-size:14px}
.smoke-row .icon.pass{color:var(--green)}
.smoke-row .icon.fail{color:var(--red)}
.smoke-row .icon.pending{color:var(--cream-muted)}
.smoke-row .icon.running{color:var(--yellow);animation:pulse 1s infinite}
.smoke-row .nm{color:var(--cream)}
.smoke-row .code{color:var(--cream-muted);font-size:10px}
.smoke-row .timing{color:var(--cream-muted);font-size:10px}
.smoke-summary{padding:14px 18px;border:1px solid var(--brass);border-radius:4px;background:linear-gradient(135deg,rgba(184,151,74,.06),transparent);margin-bottom:14px;font-family:var(--mono);font-size:12px}

/* Visit (iframe) */
.visit-bar{display:flex;gap:10px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.visit-bar select{max-width:320px;flex:1}
.iframe-wrap{border:1px solid var(--line);border-radius:4px;overflow:hidden;background:var(--void)}
.iframe-wrap iframe{width:100%;height:720px;border:0;display:block;background:var(--void)}

.empty-state{padding:32px 24px;text-align:center;color:var(--cream-muted);background:var(--ink);border:1px dashed var(--line);border-radius:5px;font-size:13px}
.disclaimer{background:rgba(139,26,26,.12);border:1px solid var(--ox);border-left:3px solid var(--ox);border-radius:3px;padding:12px 16px;margin-bottom:16px;font-size:12px;line-height:1.55;color:var(--cream-dim)}
.disclaimer strong{color:var(--brass)}

.provider-row{display:grid;grid-template-columns:auto 90px 1fr 110px 80px;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:3px;margin-bottom:6px;align-items:center;font-size:12px;background:var(--ink)}
.provider-row .toggle{width:36px;height:20px;background:var(--line);border-radius:11px;position:relative;cursor:pointer;flex-shrink:0}
.provider-row .toggle.on{background:var(--green)}
.provider-row .toggle::after{content:'';position:absolute;width:16px;height:16px;background:var(--cream);border-radius:50%;top:2px;left:2px;transition:left .2s}
.provider-row .toggle.on::after{left:18px}
.provider-row .nm{font-family:var(--mono);font-size:11px;color:var(--cream);font-weight:600}
.provider-row .tier-tag{font-family:var(--mono);font-size:9px;letter-spacing:.1em;padding:2px 6px;border-radius:3px;text-transform:uppercase;text-align:center}
.provider-row .tier-tag.t1{background:rgba(74,222,128,.15);color:var(--green)}
.provider-row .tier-tag.t2{background:rgba(96,165,250,.15);color:var(--blue)}
.provider-row .tier-tag.tf{background:rgba(168,85,247,.15);color:var(--violet)}
.provider-row .tier-tag.tp{background:rgba(255,140,0,.15);color:var(--amber)}
.provider-row .key-input{padding:5px 8px;font-size:11px}
.provider-row .status-mini{font-family:var(--mono);font-size:10px;color:var(--cream-muted);text-align:right}
.preview-area{background:var(--ink);border:1px solid var(--line);border-radius:4px;padding:14px;font-family:var(--mono);font-size:11px;line-height:1.5;color:var(--cream-dim);white-space:pre-wrap;max-height:50vh;overflow:auto;min-height:180px}
</style>

<script>
/*!
 * Fall Kit · v1.0.0 · the shared cascade for every estate seed
 * MIT · Simon Gant · ai-nativesolutions.com · ◊·κ=1
 *
 * Inlineable JS module. Drop into any seed via <script> or copy-paste inline.
 * Preserves single-HTML sovereignty (no external deps until user opts in to T2 WebLLM).
 *
 * What it gives every seed:
 *  - AI tier picker: T0 (off · default) · T2 (WebLLM in-browser, 5 models 1B-70B) · T3 (BYOK Anthropic/OpenAI/Google)
 *  - Universal entry: FallKit.aiComplete(systemPrompt, userMsg, maxTokens) → string|null
 *  - AI chip UI in header
 *  - WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN)
 *  - Help section partial: FallKit.helpSection()
 *  - Settings panel: FallKit.openSettings()
 *
 * Doctrine (per botler CLAUDE.md):
 *  - T0 fallback ALWAYS works · aiComplete returns null · caller MUST degrade gracefully
 *  - NEVER hide a feature behind AI · NEVER proxy API keys · NEVER log keys
 *  - WebLLM is lazy-loaded · model weights download ONLY on user opt-in
 *
 * Estate-first canonical references:
 *  - WebLLM pattern: Downloads/botler/index.html (T0/T2/T3 cascade)
 *  - WebRTC pattern: Downloads/fallnet/fallnet-shim.js (raw RTCPeerConnection)
 *  - Konomi seal:    ◊·κ=1  (consistent across all estate seeds)
 *  - Mesh channel:   'fall-signal'
 */
(function (root) {
  'use strict';

  const FALL_KIT_VERSION = '1.1.0';

  // ─── Model registry ──────────────────────────────────────────────
  const WEBLLM_MODELS = {
    'llama-1b':  { id: 'Llama-3.2-1B-Instruct-q4f16_1-MLC',   size: '~700MB', label: '1B · fast · any laptop / phone' },
    'llama-3b':  { id: 'Llama-3.2-3B-Instruct-q4f16_1-MLC',   size: '~2GB',   label: '3B · balanced · default · most laptops' },
    'qwen-7b':   { id: 'Qwen2.5-7B-Instruct-q4f16_1-MLC',     size: '~5GB',   label: '7B · capable · needs decent GPU (M-series Mac / 8GB+ VRAM)' },
    'llama-8b':  { id: 'Llama-3.1-8B-Instruct-q4f16_1-MLC',   size: '~5GB',   label: '8B · common · needs decent GPU' },
    'llama-70b': { id: 'Llama-3.1-70B-Instruct-q4f16_1-MLC',  size: '~40GB',  label: '70B · frontier · needs serious GPU + 64GB+ RAM' },
  };
  const DEFAULT_MODEL = 'llama-3b';

  const T3_PROVIDERS = {
    anthropic: { label: 'Anthropic Claude', models: ['claude-sonnet-4-5','claude-opus-4-7','claude-haiku-4-5'], default: 'claude-sonnet-4-5', url: 'https://api.anthropic.com/v1/messages' },
    openai:    { label: 'OpenAI',           models: ['gpt-4o','gpt-4o-mini','o1-mini'],                          default: 'gpt-4o-mini',      url: 'https://api.openai.com/v1/chat/completions' },
    google:    { label: 'Google Gemini',    models: ['gemini-1.5-pro','gemini-1.5-flash','gemini-2.0-flash-exp'], default: 'gemini-1.5-flash', url: 'https://generativelanguage.googleapis.com/v1beta/models/' },
  };

  // ─── State ───────────────────────────────────────────────────────
  const STATE = {
    config: loadConfig(),
    ai: { ready: false, loading: false, progress: 0, engine: null, model: null },
    mesh: { active: false, peers: new Map(), bc: null, signal: null },
  };

  function loadConfig() {
    try { return JSON.parse(localStorage.getItem('fall-kit.config') || '{}'); }
    catch (e) { return {}; }
  }
  function saveConfig() {
    try { localStorage.setItem('fall-kit.config', JSON.stringify(STATE.config)); } catch (e) {}
  }

  // ─── DOM helpers ─────────────────────────────────────────────────
  function $(s, root) { return (root || document).querySelector(s); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  // ─── AI tier ─────────────────────────────────────────────────────
  function aiTier() { return STATE.config.ai_tier || 'T0'; }

  function renderAiChip() {
    const chip = $('#fk-ai-chip');
    if (!chip) return;
    const txt = $('#fk-ai-chip-text');
    chip.classList.remove('fk-chip-live', 'fk-chip-loading', 'fk-chip-warn');
    const tier = aiTier();
    if (tier === 'T0') { txt.textContent = 'T0 · off'; }
    else if (tier === 'T2') {
      if (STATE.ai.ready) { txt.textContent = 'T2 ' + (WEBLLM_MODELS[STATE.config.webllm_model || DEFAULT_MODEL]?.label.split(' · ')[0] || '') + ' · ready'; chip.classList.add('fk-chip-live'); }
      else if (STATE.ai.loading) { txt.textContent = 'T2 loading ' + Math.round(STATE.ai.progress) + '%'; chip.classList.add('fk-chip-loading'); }
      else { txt.textContent = 'T2 · click to load'; chip.classList.add('fk-chip-warn'); }
    } else if (tier === 'T3') {
      if (STATE.config.api_key) { txt.textContent = 'T3 ' + (T3_PROVIDERS[STATE.config.api_provider]?.label || 'BYOK') + ' · active'; chip.classList.add('fk-chip-live'); }
      else { txt.textContent = 'T3 · no key set'; chip.classList.add('fk-chip-warn'); }
    }
  }

  async function loadWebLLM(modelKey) {
    if (STATE.ai.loading) return;
    const key = modelKey || STATE.config.webllm_model || DEFAULT_MODEL;
    const model = WEBLLM_MODELS[key];
    if (!model) { console.error('fall-kit: unknown model', key); return; }
    if (STATE.ai.ready && STATE.ai.model === model.id) return;
    STATE.ai.loading = true; STATE.ai.progress = 0; renderAiChip();
    notify('Loading WebLLM · ' + model.label + ' · ' + model.size + ' first time', 'info');
    try {
      const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm@0.2.79');
      const engine = await CreateMLCEngine(model.id, {
        initProgressCallback: p => { STATE.ai.progress = (p.progress || 0) * 100; renderAiChip(); }
      });
      STATE.ai.engine = engine;
      STATE.ai.model = model.id;
      STATE.ai.ready = true;
      STATE.ai.loading = false;
      STATE.config.webllm_model = key; saveConfig();
      renderAiChip();
      notify('WebLLM ready · sovereign mode · ' + model.label.split(' · ')[0], 'ok');
    } catch (e) {
      console.error('fall-kit: WebLLM load failed', e);
      STATE.ai.loading = false; renderAiChip();
      notify('WebLLM load failed · ' + e.message, 'err');
    }
  }

  async function aiComplete(systemPrompt, userMsg, maxTokens) {
    maxTokens = maxTokens || 600;
    const tier = aiTier();
    if (tier === 'T2' && STATE.ai.ready && STATE.ai.engine) {
      const r = await STATE.ai.engine.chat.completions.create({
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMsg }],
        max_tokens: maxTokens,
      });
      return r.choices[0].message.content;
    }
    if (tier === 'T3' && STATE.config.api_key && STATE.config.api_provider) {
      return await aiCloudCall(systemPrompt, userMsg, maxTokens);
    }
    return null;
  }

  async function aiCloudCall(sys, msg, maxTokens) {
    const provider = STATE.config.api_provider;
    const key = STATE.config.api_key;
    const model = STATE.config.api_model || T3_PROVIDERS[provider]?.default;
    if (provider === 'anthropic') {
      const r = await fetch(T3_PROVIDERS.anthropic.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model, max_tokens: maxTokens, system: sys, messages: [{ role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('Anthropic ' + r.status + ': ' + (await r.text()).slice(0, 200));
      const j = await r.json();
      return j.content[0].text;
    }
    if (provider === 'openai') {
      const r = await fetch(T3_PROVIDERS.openai.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: 'system', content: sys }, { role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('OpenAI ' + r.status);
      const j = await r.json();
      return j.choices[0].message.content;
    }
    if (provider === 'google') {
      const r = await fetch(T3_PROVIDERS.google.url + model + ':generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: sys + '\n\n---\n\n' + msg }] }], generationConfig: { maxOutputTokens: maxTokens } }),
      });
      if (!r.ok) throw new Error('Google ' + r.status);
      const j = await r.json();
      return j.candidates[0].content.parts[0].text;
    }
    throw new Error('unknown provider: ' + provider);

  function meshStart(opts) {

    try { STATE.mesh.bc = new BroadcastChannel(MESH_CHANNEL); }

      const m = e.data;
      if (!m || !m.kind || m.peerId === seedId) return;
      if (opts.onMessage) opts.onMessage(m);

    STATE.mesh.bc.postMessage({ kind: 'fall-kit:hello', peerId: seedId, ts: Date.now(), seedName: opts.seedName || 'unknown' });

    notify('Mesh active · channel ' + MESH_CHANNEL, 'ok');

// ─── IDB ────────────────────────────────────────────────
const IDB_NAME = 'fallseed-meta-v1';
let db;
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('config')) d.createObjectStore('config');
      if (!d.objectStoreNames.contains('smokeHistory')) d.createObjectStore('smokeHistory', { keyPath:'id' });
    };
    r.onsuccess = e => { db = e.target.result; res(db); };
    r.onerror = rej;
  });
}
function idbGet(s,k) { return new Promise(r => { const tx=db.transaction(s,'readonly'); const q=tx.objectStore(s).get(k); q.onsuccess=()=>r(q.result); }); }
function idbGetAll(s) { return new Promise(r => { const tx=db.transaction(s,'readonly'); const q=tx.objectStore(s).getAll(); q.onsuccess=()=>r(q.result||[]); }); }
function idbPut(s,v,k) { return new Promise(r => { const tx=db.transaction(s,'readwrite'); const o=tx.objectStore(s); const q=k!=null?o.put(v,k):o.put(v); q.onsuccess=()=>r(true); }); }
function idbClear(s) { return new Promise(r => { const tx=db.transaction(s,'readwrite'); const q=tx.objectStore(s).clear(); q.onsuccess=()=>r(true); }); }

async function loadAll() {
  if (!db) await openDB();
  state.providerConfig = await idbGet('config','providerConfig') || {};
  state.usage = await idbGet('config','usage') || {};
  for (const p of PROVIDERS) {
    if (!(p.id in state.providerConfig)) state.providerConfig[p.id] = { enabled:p.defaultEnabled, key:'', customModel:'' };
    if (!(p.id in state.usage)) state.usage[p.id] = { totalIn:0, totalOut:0, calls:0, lastUsed:0 };
  }
  await idbPut('config', state.providerConfig, 'providerConfig');
  state.registry = await idbGet('config','registryCache') || null;
  state.registryFetchedAt = await idbGet('config','registryCacheAt') || 0;
}
async function persistProviderConfig() { await idbPut('config', state.providerConfig, 'providerConfig'); }

// ─── REGISTRY FETCH ─────────────────────────────────────
async function fetchRegistry(force) {
  if (state.registryFetching) return;
  state.registryFetching = true;
  try {
    const url = TOOL.registryUrl + (force ? '?cb=' + Date.now() : '');
    const r = await fetch(url, { cache: 'no-cache' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const reg = await r.json();
    state.registry = reg;
    state.registryFetchedAt = Date.now();
    await idbPut('config', reg, 'registryCache');
    await idbPut('config', state.registryFetchedAt, 'registryCacheAt');

window.__fellowSeeds = window.__fellowSeeds || new Map();
window.__crossSeedHandlers = window.__crossSeedHandlers || {};
window.__crossSeedPending = window.__crossSeedPending || new Map();
let __sigChan = null, __pingTimer = null;
function __seedSelfInfo() {
  return { source:'fallseed-meta', name:TOOL.name, prime:TOOL.prime, version:TOOL.version, level:null, parent:null, mesh:TOOL.meshChannel, category:TOOL.category, ts:Date.now() };
}
window.__crossSeedHandlers['introspect'] = async function() { return { manifest:TOOL, peerCount:window.__fellowSeeds.size, ts:Date.now() }; };
function __pruneFellowSeeds() { const cutoff = Date.now()-90000; for (const [k,v] of window.__fellowSeeds.entries()) if (v.lastSeen < cutoff) window.__fellowSeeds.delete(k); }
function initMesh() {
  try {
    __sigChan = new BroadcastChannel('fall-signal');
    __sigChan.postMessage({ type:'hello', ...__seedSelfInfo() });
    __sigChan.onmessage = async (e) => {
      const m = e.data||{}; if (!m.type) return;
      const self = 'fallseed-meta';
      if (m.type === 'hello' || m.type === 'pong') {
        if (!m.source || m.source === self) return;
        const ex = window.__fellowSeeds.get(m.source) || {};
        window.__fellowSeeds.set(m.source, { ...ex, ...m, lastSeen: Date.now() });
        if (state.active === 'mesh' || state.active === 'population' || state.active === 'lineage') try { render(); } catch(e) {}
      } else if (m.type === 'ping') {
        try { __sigChan.postMessage({ type:'pong', ...__seedSelfInfo() }); } catch(e) {}
      } else if (m.type === 'request' && (m.to === self || m.to === '*') && m.from !== self) {
        const handler = window.__crossSeedHandlers[m.kind]; if (!handler) return;
        try { const result = await handler(m.payload||{}); __sigChan.postMessage({ type:'response', kind:m.kind, from:self, to:m.from, payload:result, reqId:m.reqId }); }
        catch (err) { __sigChan.postMessage({ type:'response', kind:m.kind, from:self, to:m.from, payload:{error:err.message}, reqId:m.reqId }); }
      } else if (m.type === 'response' && m.to === self) {
        const p = window.__crossSeedPending.get(m.reqId);
        if (p) { clearTimeout(p.timer); p.resolve(m.payload); window.__crossSeedPending.delete(m.reqId); }
      }
    };
    __pingTimer = setInterval(()=>{ try { __sigChan.postMessage({type:'ping',...__seedSelfInfo()}); __pruneFellowSeeds(); if (state.active==='mesh') render(); } catch(e){} }, 10000); // faster ping for monitor
  } catch(e) {}
}
async function crossSeedRequest(target, kind, payload, opts) {
  opts = opts || {}; const reqId = 'r_' + Math.random().toString(36).slice(2,12);
  return new Promise((resolve,reject) => {
    const timer = setTimeout(()=>{ window.__crossSeedPending.delete(reqId); reject(new Error('timeout')); }, opts.timeoutMs||3000);
    window.__crossSeedPending.set(reqId, { resolve, reject, timer });
    try { __sigChan.postMessage({ type:'request', kind, from:'fallseed-meta', to:target, payload, reqId }); }
    catch(e) { clearTimeout(timer); window.__crossSeedPending.delete(reqId); reject(e); }
  });
}
window.crossSeedRequest = crossSeedRequest;

function groupByLevel(seeds) {

}

async function smokeOne(seed) {
  const start = Date.now();
  try {
    const url = seed.url + '?cb=' + start;
    state.smokeResults[seed.name] = { status: 'running' };
    if (state.active === 'smoke') render();
    const r = await fetch(url, { cache:'no-cache' });
    const ms = Date.now() - start;
    if (!r.ok) {
      state.smokeResults[seed.name] = { status:'fail', code:r.status, ms, error:'HTTP ' + r.status };
      return;
    }
    const text = await r.text();
    const marker = /^fallseed/.test(seed.name) ? 'FallSeed' : /^fallrecall/.test(seed.name) ? 'fallrecall' : seed.name;
    const passes = text.toLowerCase().includes(marker.toLowerCase());
    state.smokeResults[seed.name] = passes ? { status:'pass', code:r.status, ms } : { status:'fail', code:r.status, ms, error:'marker missing' };
  } catch (e) {
    state.smokeResults[seed.name] = { status:'fail', error: e.message, ms: Date.now() - start };
  }
}
window.runSmokeAll = async function() {
  const seeds = getSeeds();
  if (!seeds.length) { toast('no registry', true); return; }
  state.smokeRunning = true; state.smokeResults = {};
  render();
  // Run in parallel batches of 4
  const batchSize = 4;
  for (let i = 0; i < seeds.length; i += batchSize) {
    await Promise.all(seeds.slice(i, i+batchSize).map(s => smokeOne(s)));
    if (state.active === 'smoke') render();
  }
  state.smokeRunning = false;
  state.smokeLastRun = Date.now();
  await idbPut('smokeHistory', { id: 'sh_' + Date.now(), ts: Date.now(), results: state.smokeResults });
  const pass = Object.values(state.smokeResults).filter(r => r.status==='pass').length;
  toast(`smoke done · ${pass}/${seeds.length} pass`);
  if (state.active === 'smoke') render();
};

    const out = $('#buildOutput'); out.textContent = '';
    try { await cascadeChat(p, { onChunk: d => { out.textContent += d; out.scrollTop = out.scrollHeight; } }); }
    catch (e) { out.textContent = '✗ ' + e.message; }
  });
}
function eligibleProviders() { return PROVIDERS.filter(p => state.providerConfig[p.id]?.enabled && (!p.requiresKey || state.providerConfig[p.id]?.key)).sort((a,b)=>a.priority-b.priority); }
async function cascadeChat(prompt, opts) {
  opts = opts||{}; const onChunk = opts.onChunk || (()=>{});
  const system = 'You are a precise analyser for the FallSeed estate monitor. Output exactly what is asked, no preamble.';
  const elig = eligibleProviders();
  if (!elig.length) throw new Error('No providers enabled.');
  for (const p of elig) {
    try { return await callProvider(p, system, prompt, onChunk); } catch (e) { continue; }
  }
  throw new Error('all providers failed');
}
async function callProvider(p, system, prompt, onChunk) {
  const cfg = state.providerConfig[p.id]||{}; const model = cfg.customModel || p.model;
  if (p.id === 'webllm') throw new Error('WebLLM not implemented in meta');
  if (p.id === 'google') {
    const url = p.endpoint + '?alt=sse&key=' + encodeURIComponent(cfg.key);
    const body = { systemInstruction:{parts:[{text:system}]}, contents:[{role:'user',parts:[{text:prompt}]}], generationConfig:{temperature:0.4,maxOutputTokens:4096} };
    const r = await fetch(url, { method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify(body) });
    if (!r.ok) throw new Error('Google ' + r.status); return await streamSSE(r, onChunk, 'google');
  }
  if (p.id === 'anthropic') {
    const r = await fetch(p.endpoint, { method:'POST', headers:{'content-type':'application/json','x-api-key':cfg.key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'}, body:JSON.stringify({ model, max_tokens:4096, stream:true, system, messages:[{role:'user',content:prompt}] }) });
    if (!r.ok) throw new Error('Anthropic ' + r.status); return await streamSSE(r, onChunk, 'anthropic');
  }
  const headers = { 'content-type':'application/json' };
  if (cfg.key) headers['authorization'] = 'Bearer ' + cfg.key;
  const r = await fetch(p.endpoint, { method:'POST', headers, body:JSON.stringify({ model, messages:[{role:'system',content:system},{role:'user',content:prompt}], stream:true, temperature:0.4 }) });
  if (!r.ok) throw new Error(p.name + ' ' + r.status);
  return await streamSSE(r, onChunk, 'openai');
}
async function streamSSE(response, onChunk, kind) {
  const reader = response.body.getReader(); const dec = new TextDecoder(); let buf='', acc='';
  while(true) {
    const {value,done} = await reader.read(); if (done) break;
    buf += dec.decode(value, {stream:true});
    const lines = buf.split(/\r?\n/); buf = lines.pop()||'';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim(); if (data === '[DONE]') continue;
      try {
        const j = JSON.parse(data); let d='';
        if (kind === 'anthropic') { if (j.type === 'content_block_delta') d = j.delta?.text||''; }
        else if (kind === 'google') { d = j.candidates?.[0]?.content?.parts?.[0]?.text||''; }
        else { d = j.choices?.[0]?.delta?.content||''; }
        if (d) { acc+=d; onChunk(d); }
      } catch(e) {}
    }
  }
  return acc;
}

function renderProviders(main) {
  main.innerHTML = `
    <div class="section-h"><h2>LLM providers</h2></div>

      const cfg = state.providerConfig[p.id]||{}; const tc = p.tier==='T1'?'t1':p.tier==='T2'?'t2':p.tier==='T3-free'?'tf':'tp';
      return `<div class="provider-row"><div class="toggle ${cfg.enabled?'on':''}" onclick="toggleProvider('${p.id}')"></div><div class="tier-tag ${tc}">${p.tier}</div><div><div class="nm">${esc(p.name)}</div><div style="font-size:10px;color:var(--cream-muted);font-family:var(--mono);margin-top:2px;letter-spacing:.04em">${esc(p.note)}</div></div>${p.requiresKey?`<input class="key-input" type="password" value="${esc(cfg.key||'')}" placeholder="api key" onchange="setProviderKey('${p.id}', this.value)">`:'<div></div>'}<div class="status-mini">${p.requiresKey && !cfg.key?'<a href="'+(p.signupUrl||'#')+'" target="_blank" style="color:var(--brass)">sign up</a>':(cfg.enabled?'active':'off')}</div></div>`;
    }).join('')}</div>
  `;
}
window.toggleProvider = async function(id) { state.providerConfig[id].enabled = !state.providerConfig[id].enabled; await persistProviderConfig(); render(); };
window.setProviderKey = async function(id, key) { state.providerConfig[id].key = key; await persistProviderConfig(); };

      <p style="font-size:11px;color:var(--cream-muted);font-family:var(--mono);letter-spacing:.06em">category <span style="color:var(--brass)">meta</span> · prime <span style="color:var(--brass)">${TOOL.prime}</span> · MIT</p>
    </div>
  `;
}

function renderSettings(main) {
  main.innerHTML = `
    <div class="section-h"><h2>Settings</h2></div>
    <div class="card"><h3>Registry cache</h3><p style="font-size:12px;color:var(--cream-dim);margin-bottom:10px">Last fetched: ${state.registryFetchedAt ? new Date(state.registryFetchedAt).toLocaleString() : 'never'}</p><div style="display:flex;gap:8px"><button class="btn brass sm" onclick="fetchRegistry(true)">↻ force refresh</button><button class="btn sm" onclick="clearRegistry()">clear cache</button></div></div>
    <div class="card"><h3>Wipe</h3><button class="btn danger sm" onclick="wipeAll()">⚠ wipe everything</button></div>
  `;

window.clearRegistry = async function() { state.registry = null; state.registryFetchedAt = 0; await idbPut('config', null, 'registryCache'); await idbPut('config', 0, 'registryCacheAt'); toast('registry cache cleared'); render(); };
window.wipeAll = async function() { if (!confirm('Wipe everything?')) return; await idbClear('smokeHistory'); state.smokeResults = {}; await persistProviderConfig(); toast('wiped'); render(); };

// ─── BOOT ──────────────────────────────────────────────
async function boot() {
  await openDB(); await loadAll(); initMesh(); await autoDetectLocal();
  renderNav();
  // Auto-fetch registry if stale (>5 min) or missing
  if (!state.registry || (Date.now() - state.registryFetchedAt > 5*60*1000)) {
    fetchRegistry(false);
  }
  render();
}
boot().catch(e => { console.error(e); document.body.insertAdjacentHTML('beforeend', '<div style="position:fixed;bottom:20px;left:20px;background:#8b1a1a;color:#fff;padding:14px 18px;border-radius:4px;z-index:9999;font-family:monospace">boot failed: '+e.message+'</div>'); });
</script>
